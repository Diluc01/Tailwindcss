<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <div
      class="bg-violet-200 h-10 w-full border-2 border-violet-600 rounded-md my-4 p-6 flex justify-center items-center"
    >
      <h1 class="text-center font-mono font-extrabold text-[30px]">
        Hello world!
      </h1>
    </div>
    <div class="flex justify-evenly space-evenly space-y-6 mt-2">
      <div class="h-16 w-16 rounded-full bg-blue-500"></div>
      <div class="h-16 w-16 rounded-full bg-orange-500"></div>
      <div class="h-16 w-16 rounded-full bg-green-500"></div>
    </div>

    <div class="sm:bg-amber-500 md:bg-amber-700">
      <p class="text-white">I appear on screen wider than 768px</p>
    </div>

    <div class="bg-white dark:bg-black text-black dark:text-white">
      Dark mode enabled!
    </div>

    <p class="p-[16px] text-[30px] text-chestnut bg-zinc-50">Chestnut Color</p>

    <div class="card">
      <h3>Writes Upside-Down</h3>
      <p>
        The Zero Gravity Pen can be used to write in any orientation, including
        upside-down. It even works in outer space.
      </p>

      <button id="toggleDark" onclick="document.body.classList.toggle('dark')">
        Toggle Dark Mode
      </button>
    </div>

    // To showcase the demo of dark theme. Copy paste :)
    <script type="text/javascript">
      document.addEventListener("DOMContentLoaded", () => {
        const toggleDark = document.getElementById("toggleDark");
        toggleDark.addEventListener("click", function () {
          if (document.documentElement.classList.includes("dark")) {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
          alert("click!");
        });
      });
    </script>
  </body>
</html>
